<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador DPS - Acadêmico</title>
    <style>
        :root {
            --bg-color: #1e1e2f;
            --panel-bg: #2a2a40;
            --text-color: #e0e0e0;
            --accent: #00d2ff;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            --grid-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 5px;
        }

        p.subtitle {
            color: #a4b0be;
            margin-bottom: 20px;
            text-align: center;
        }

        .container {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 850px;
        }

        /* Área do Circuito Elétrico */
        .circuit-panel {
            background-color: #0b0c10;
            border: 2px solid #454552;
            border-radius: 8px;
            margin-bottom: 20px;
            padding: 10px;
            position: relative;
        }

        .circuit-svg {
            width: 100%;
            height: 180px;
            display: block;
        }

        /* Animações de Fluxo de Corrente */
        .flow-line {
            stroke-dasharray: 10, 10;
            animation: dash 1s linear infinite;
        }
        
        .flow-surge {
            stroke-dasharray: 15, 10;
            animation: dash-fast 0.5s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: -20; }
        }
        @keyframes dash-fast {
            to { stroke-dashoffset: -25; }
        }

        .hidden { display: none; }
        .shake { animation: shake 0.3s infinite; }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* Área do Gráfico */
        .oscilloscope {
            position: relative;
            background-color: #0b0c10;
            border: 2px solid #454552;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 400px;
        }

        /* Alerta de Status Ajustado */
        #status-alert {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 260px; 
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            line-height: 1.4;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            text-transform: uppercase;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            z-index: 10;
            text-align: left;
            word-wrap: break-word;
        }

        .alert-danger { background-color: rgba(255, 71, 87, 0.95); color: white; border: 2px solid #ff6b81; }
        .alert-success { background-color: rgba(46, 213, 115, 0.95); color: white; border: 2px solid #7bed9f; }
        .alert-warning { background-color: rgba(255, 165, 2, 0.95); color: black; border: 2px solid #eccc68; }

        /* Painel de Controle e Dimensionamento */
        .controls-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
        }

        .panel-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: bold;
            color: #a4b0be;
            border-bottom: 1px solid #454552;
            padding-bottom: 5px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .slider-group label {
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .slider-group span {
            font-weight: bold;
            color: var(--accent);
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
        }

        /* Botões */
        .action-buttons {
            grid-column: span 2;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            color: white;
        }

        button:active { transform: scale(0.95); }
        button:hover { filter: brightness(1.2); }
        
        #btn-surto { background-color: var(--danger); box-shadow: 0 4px 0 #c23616; }
        #btn-dps { background-color: #2ed573; box-shadow: 0 4px 0 #218c53; color: #000; }
        #btn-dps.off { background-color: #747d8c; box-shadow: 0 4px 0 #57606f; color: #fff; }

        .legend {
            margin-top: 15px;
            font-size: 14px;
            color: #a4b0be;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        
        .legend span { display: flex; align-items: center; gap: 5px; }
        .color-box { width: 12px; height: 12px; display: inline-block; border-radius: 3px; }
    </style>
</head>
<body>

    <h1>Simulador de DPS: Arco Elétrico e Dimensionamento</h1>
    <p class="subtitle">Análise gráfica e comportamental de surtos transitórios conforme a NBR 5410</p>

    <div class="container">
        
        <div class="circuit-panel">
            <svg viewBox="0 0 800 180" class="circuit-svg">
                <text x="10" y="35" fill="#a4b0be" font-size="14" font-weight="bold">L (Fase)</text>
                <text x="10" y="115" fill="#a4b0be" font-size="14" font-weight="bold">N (Neutro)</text>
                <text x="10" y="165" fill="#2ed573" font-size="14" font-weight="bold">PE (Terra)</text>

                <line x1="80" y1="30" x2="750" y2="30" stroke="#454552" stroke-width="4" />
                <line x1="80" y1="110" x2="750" y2="110" stroke="#454552" stroke-width="4" />
                <line x1="80" y1="160" x2="400" y2="160" stroke="#218c53" stroke-width="4" />

                <line x1="350" y1="30" x2="350" y2="160" stroke="#454552" stroke-width="4" />
                <line x1="600" y1="30" x2="600" y2="110" stroke="#454552" stroke-width="4" /> 

                <path id="flow-normal" d="M 80 30 L 600 30 L 600 110 L 80 110" fill="none" stroke="#00d2ff" stroke-width="3" class="flow-line" />
                <path id="flow-surge-dps" d="M 80 30 L 350 30 L 350 160 L 80 160" fill="none" stroke="#eccc68" stroke-width="6" class="flow-surge hidden" />
                <path id="flow-surge-equip" d="M 80 30 L 600 30 L 600 110" fill="none" stroke="#ff4757" stroke-width="8" class="flow-surge hidden" />

                <g id="group-dps" transform="translate(320, 60)">
                    <rect width="60" height="40" fill="#2a2a40" stroke="#2ed573" stroke-width="2" rx="4" id="rect-dps"/>
                    <text x="30" y="17" fill="white" font-size="13" font-weight="bold" text-anchor="middle">DPS</text>
                    <text id="dps-status-text" x="30" y="32" fill="#a4b0be" font-size="10" font-weight="bold" text-anchor="middle">ABERTO</text>
                </g>

                <g id="group-equip" transform="translate(540, 50)">
                    <rect width="120" height="60" fill="#2a2a40" stroke="#00d2ff" stroke-width="2" rx="4" id="rect-equip"/>
                    <text x="60" y="35" fill="white" font-size="14" font-weight="bold" text-anchor="middle">Equipamento</text>
                </g>
            </svg>
        </div>

        <div class="oscilloscope">
            <div id="status-alert">STATUS</div>
            <canvas id="graphCanvas" width="800" height="400"></canvas>
        </div>

        <div class="controls-wrapper">
            <div class="panel-section">
                <div class="panel-title">1. Dados do Sistema</div>
                <div class="slider-group">
                    <label>Rede AC Nominal: <span>220V</span> </label>
                    <label> AC Máxima Admissível (NBR 5410): <span>242V Pico</span></label>
                </div>
                <div class="slider-group">
                    <label>Limite de Ruptura Isolação: <span>1500V</span></label>
                </div>
                <div class="slider-group">
                    <label>Tensão de Ensaio do Surto: <span>5000V</span></label>
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-title">2. Parâmetros do DPS</div>
                <div class="slider-group">
                    <label>Tensão de Regime Máxima (Uc): <span id="val-uc">275V</span></label>
                    <input type="range" id="slider-uc" min="150" max="500" value="275" step="5">
                </div>
                <div class="slider-group">
                    <label>Nível de Proteção/Resíduo (Up): <span id="val-up">1200V</span></label>
                    <input type="range" id="slider-up" min="500" max="5500" value="1200" step="50">
                </div>
            </div>

            <div class="action-buttons">
                <button id="btn-dps" class="">🛡️ DPS CONECTADO</button>
                <button id="btn-surto">⚡ DISPARAR SURTO (5000V)</button>
            </div>
        </div>
        
        <div class="legend">
            <span><div class="color-box" style="background: #00d2ff;"></div> Senoide / Corrente Normal</span>
            <span><div class="color-box" style="background: #ff4757;"></div> Falha de Ruptura (1500V)</span>
            <span><div class="color-box" style="background: #eccc68;"></div> Desvio / DPS Conduzindo</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        const alertBox = document.getElementById('status-alert');

        const V_PEAK = 242; 
        const SURGE_PEAK = 5000;
        const ARC_THRESHOLD = 1500;
        const MAX_Y_SCALE = 5500;
        const POINTS_COUNT = canvas.width;
        
        let waveData = new Array(POINTS_COUNT).fill(0).map(() => ({ voltage: 0, clamped: false }));
        let time = 0;
        
        let dpsLigado = true; 
        let surtoAtivo = false;
        let progressoSurto = 0;
        let voltimetroMaximo = 242; 

        let alertBloqueadoPorSurto = false;
        let timeoutLimpezaAlert = null;

        const sliderUc = document.getElementById('slider-uc');
        const sliderUp = document.getElementById('slider-up');
        const valUc = document.getElementById('val-uc');
        const valUp = document.getElementById('val-up');
        const btnDps = document.getElementById('btn-dps');

        const flowNormal = document.getElementById('flow-normal');
        const flowSurgeDps = document.getElementById('flow-surge-dps');
        const flowSurgeEquip = document.getElementById('flow-surge-equip');
        const rectDps = document.getElementById('rect-dps');
        const rectEquip = document.getElementById('rect-equip');
        const groupEquip = document.getElementById('group-equip');
        const dpsStatusText = document.getElementById('dps-status-text');

        sliderUc.addEventListener('input', (e) => valUc.textContent = e.target.value + 'V');
        sliderUp.addEventListener('input', (e) => valUp.textContent = e.target.value + 'V');

        btnDps.addEventListener('click', () => {
            dpsLigado = !dpsLigado;
            if (dpsLigado) {
                btnDps.className = '';
                btnDps.textContent = '🛡️ DPS CONECTADO';
                rectDps.setAttribute('stroke', '#2ed573');
            } else {
                btnDps.className = 'off';
                btnDps.textContent = '🛡️ CONECTAR DPS';
                rectDps.setAttribute('stroke', '#454552');
                if (!surtoAtivo) hideAlert();
            }
            if (!surtoAtivo) voltimetroMaximo = 242;
        });

        document.getElementById('btn-surto').addEventListener('click', () => {
            if (!surtoAtivo) {
                surtoAtivo = true;
                progressoSurto = 0;
                voltimetroMaximo = 0;
                alertBloqueadoPorSurto = true; 
                clearTimeout(timeoutLimpezaAlert);
            }
        });

        function showAlert(msg, type) {
            alertBox.textContent = msg;
            alertBox.className = `alert-${type}`;
            alertBox.style.opacity = '1';
        }

        function hideAlert() {
            alertBox.style.opacity = '0';
        }

        function mapY(voltage) {
            const centerY = canvas.height / 2;
            return centerY - (voltage / MAX_Y_SCALE) * centerY;
        }

        function atualizarPainelCircuito(isClamped, tensaoNaCarga) {
            const falhaEquipamento = Math.abs(tensaoNaCarga) >= ARC_THRESHOLD;

            // Lógica do Status da Chave do DPS
            if (dpsLigado) {
                if (isClamped) {
                    dpsStatusText.textContent = "FECHADO";
                    dpsStatusText.setAttribute('fill', '#eccc68');
                    rectDps.setAttribute('stroke', '#eccc68');
                    
                    flowSurgeDps.classList.remove('hidden');
                    flowSurgeDps.setAttribute('stroke', falhaEquipamento ? '#ff4757' : '#eccc68');
                } else {
                    dpsStatusText.textContent = "ABERTO";
                    dpsStatusText.setAttribute('fill', '#a4b0be');
                    rectDps.setAttribute('stroke', '#2ed573');
                    flowSurgeDps.classList.add('hidden');
                }
            } else {
                dpsStatusText.textContent = "DESLIG.";
                dpsStatusText.setAttribute('fill', '#454552');
                rectDps.setAttribute('stroke', '#454552');
                flowSurgeDps.classList.add('hidden');
            }

            // Lógica do Equipamento
            if (falhaEquipamento) {
                flowSurgeEquip.classList.remove('hidden');
                flowSurgeEquip.setAttribute('stroke', '#ff4757');
                
                flowNormal.setAttribute('stroke', '#ff4757');
                groupEquip.classList.add('shake');
                rectEquip.setAttribute('fill', 'rgba(255, 71, 87, 0.3)');
                rectEquip.setAttribute('stroke', '#ff4757');
            } else {
                flowSurgeEquip.classList.add('hidden');
                flowNormal.setAttribute('stroke', (dpsLigado && isClamped) ? '#eccc68' : '#00d2ff');
                groupEquip.classList.remove('shake');
                rectEquip.setAttribute('fill', '#2a2a40');
                rectEquip.setAttribute('stroke', '#00d2ff');
            }
        }

        function render() {
            time += 0.05; 
            let currentVoltage = V_PEAK * Math.sin(time);
            let isClamped = false;

            const currentUc = parseFloat(sliderUc.value);
            const currentUp = parseFloat(sliderUp.value);

            if (surtoAtivo) {
                progressoSurto += 1;
                if (progressoSurto > 5 && progressoSurto < 25) {
                    let fatorPulso = Math.sin((progressoSurto - 5) / 20 * Math.PI); 
                    currentVoltage += SURGE_PEAK * fatorPulso;
                }
                
                if (dpsLigado) {
                    if (currentUp >= ARC_THRESHOLD) {
                        showAlert("❌ FALHA DE COORDENAÇÃO: O DPS atuou, mas o nível de proteção (Up = " + currentUp + "V) rompeu a isolação.", "danger");
                    } else {
                        showAlert("✅ SURTO PROTEGIDO: O DPS fechou o circuito e desviou o surto (Up = " + currentUp + "V).", "success");
                    }
                } else {
                    showAlert("💥 ARCO ELÉTRICO: Sem DPS, a sobretensão rompeu instantaneamente a isolação sólida.", "danger");
                }

                if (progressoSurto >= 60) {
                    surtoAtivo = false;
                    alertBloqueadoPorSurto = false;
                    timeoutLimpezaAlert = setTimeout(() => {
                        if (!surtoAtivo && !alertBloqueadoPorSurto) hideAlert();
                    }, 5000);
                }
            }

            if (dpsLigado) {
                let limiteGrampeamento = surtoAtivo ? currentUp : currentUc;

                // O DPS só "fecha" a chave quando a tensão excede o limite (Uc ou Up)
                if (Math.abs(currentVoltage) >= limiteGrampeamento) {
                    isClamped = true;
                    currentVoltage = currentVoltage > 0 ? limiteGrampeamento : -limiteGrampeamento;
                    
                    if (!alertBloqueadoPorSurto && Math.abs(V_PEAK * Math.sin(time)) >= currentUc) {
                        showAlert("⚠️ ERRO: Uc baixo! O DPS está fechando em regime normal e fugindo corrente.", "warning");
                    }
                } else if (!alertBloqueadoPorSurto && alertBox.classList.contains('alert-warning')) {
                    hideAlert();
                }
            } else if (!alertBloqueadoPorSurto) {
                if (alertBox.className.includes('alert-warning')) hideAlert();
            }

            if (Math.abs(currentVoltage) > voltimetroMaximo) {
                voltimetroMaximo = Math.round(Math.abs(currentVoltage));
            }

            atualizarPainelCircuito(isClamped, currentVoltage);

            waveData.shift();
            waveData.push({ voltage: currentVoltage, clamped: isClamped });

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Grade
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let y = 0; y <= canvas.height; y += 50) { ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); }
            for (let x = 0; x <= canvas.width; x += 50) { ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); }
            ctx.stroke();

            // Centro
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
            ctx.beginPath(); ctx.moveTo(0, canvas.height / 2); ctx.lineTo(canvas.width, canvas.height / 2); ctx.stroke();

            // Limite Ruptura
            ctx.strokeStyle = '#ff4757';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            ctx.moveTo(0, mapY(ARC_THRESHOLD)); ctx.lineTo(canvas.width, mapY(ARC_THRESHOLD));
            ctx.moveTo(0, mapY(-ARC_THRESHOLD)); ctx.lineTo(canvas.width, mapY(-ARC_THRESHOLD));
            ctx.stroke();
            
            // Linha DPS
            if (dpsLigado) {
                let linhaReferencia = surtoAtivo ? currentUp : currentUc;
                ctx.strokeStyle = '#eccc68';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(0, mapY(linhaReferencia)); ctx.lineTo(canvas.width, mapY(linhaReferencia));
                ctx.moveTo(0, mapY(-linhaReferencia)); ctx.lineTo(canvas.width, mapY(-linhaReferencia));
                ctx.stroke();
            }
            ctx.setLineDash([]);

            // Textos Gráfico
            ctx.font = '11px sans-serif';
            ctx.fillStyle = '#ff4757';
            ctx.fillText(`Limite de Ruptura Suportável (${ARC_THRESHOLD}V)`, 15, mapY(ARC_THRESHOLD) - 6);
            
            if (dpsLigado) {
                ctx.fillStyle = '#eccc68';
                if (surtoAtivo) {
                    ctx.fillText(`Nível de Proteção Ativo (Up = ${currentUp}V)`, 15, mapY(currentUp) + 14);
                } else {
                    ctx.fillText(`Tensão de Regime Limite (Uc = ${currentUc}V)`, 15, mapY(currentUc) + 14);
                }
            }

            // Voltímetro
            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(canvas.width - 230, 15, 215, 45);
            ctx.strokeStyle = dpsLigado && currentUp >= ARC_THRESHOLD && voltimetroMaximo > ARC_THRESHOLD ? '#ff4757' : (surtoAtivo ? '#2ed573' : '#00d2ff');
            ctx.lineWidth = 1.5;
            ctx.strokeRect(canvas.width - 230, 15, 215, 45);
            
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px monospace';
            ctx.fillText(`PICO MÁX: ${voltimetroMaximo} V`, canvas.width - 210, 41);

            // Traço
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let i = 0; i < waveData.length; i++) {
                const x = i; const y = mapY(waveData[i].voltage);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            
            let traceColor = '#00d2ff';
            const lastPoint = waveData[waveData.length - 1];
            if (Math.abs(lastPoint.voltage) >= ARC_THRESHOLD) traceColor = '#ff4757'; 
            else if (lastPoint.clamped) traceColor = '#eccc68'; 
            
            ctx.strokeStyle = traceColor;
            ctx.stroke();

            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
